publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  get: ^4.6.6
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.0
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo.png
